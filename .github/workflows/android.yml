name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Run Android lint
        run: ./gradlew lint --stacktrace --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Compile instrumentation tests
        run: ./gradlew compileDebugAndroidTestKotlin --stacktrace --no-daemon

      - name: Compile qaRelease TLS smoke
        run: ./gradlew compileQaReleaseAndroidTestKotlin -Pandroid.testBuildType=qaRelease --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxmox-ve-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
